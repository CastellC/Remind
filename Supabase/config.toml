# Evidence — minimal Supabase CLI configuration
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "evidence"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[db.migrations]
schema_paths = []

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["com.evidence.app://auth-callback"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
